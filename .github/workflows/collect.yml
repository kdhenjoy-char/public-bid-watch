name: Collect bid announcements

on:
  schedule:
    # 매일 한국시간 08:00 (UTC 23:00 전날)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          LOOKBACK_DAYS: "14"
        run: python scripts/collect.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/announcements.json
          git diff --quiet --cached || git commit -m "chore: update announcements ($(date -u +'%Y-%m-%d'))"
          git fetch origin main
          # data/announcements.json은 자동생성 파일이므로, 충돌 시 항상 방금 수집한(로컬) 결과를 우선한다.
          git merge origin/main --no-edit -X ours || true
          git push
